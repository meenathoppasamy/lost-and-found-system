<!DOCTYPE html>
<html>
<head>
<title>Submit Report</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">

<h2>Submit Lost / Found Report</h2>

<form id="itemForm">
<input type="text" name="title" placeholder="Item Title" required>
<textarea name="description" placeholder="Item Description" required></textarea>
<select name="category">
<option value="Lost">Lost</option>
<option value="Found">Found</option>
</select>
<input type="text" name="location" placeholder="Location">
<input type="date" name="date">
<input type="text" name="contact" placeholder="Contact Information">
<button type="submit">Submit Report</button>
</form>

<div class="nav">
<a href="/">Back to Home</a>
</div>

<footer>
Quest International University Lost & Found System
</footer>

</div>
<script src="/js/script.js"></script>
</body>
</html>
